name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

jobs:
  ci:
    name: ${{ matrix.target }} • Node=${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [24]
        target: [node, browser]

    defaults:
      run:
        working-directory: packages/core

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test Matrix Execution
        run: |
          if [ "${{ matrix.target }}" = "node" ]; then
            npm run test -w @zk-payroll/core
          else
            npm run test:browser -w @zk-payroll/core
          fi
